name: CI

on:
  push:
    branches: [main, development, "release/*"]
  pull_request:
    branches: [main, "release/*"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Least privilege: nothing after checkout does git operations, so keep
          # GITHUB_TOKEN out of .git/config (matches claude-review.yml).
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Type check (ty)
        run: uv run ty check src/

      - name: Self-lint (safelint must pass itself)
        # CLAUDE.md mandates that ``safelint check src/`` produces zero
        # blocking violations before merging - pre-commit enforces this
        # locally, this step enforces it at the CI tier so a push that
        # bypasses pre-commit can't slip through. ``--fail-on=error``
        # matches the CI mode used by the pre-commit hook.
        run: uv run safelint check src/ --all-files --fail-on=error

  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Least privilege: nothing after checkout does git operations, so keep
          # GITHUB_TOKEN out of .git/config (matches claude-review.yml).
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -q
