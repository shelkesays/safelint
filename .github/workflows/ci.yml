name: CI

on:
  push:
    branches: [main, development, "release/*"]
  pull_request:
    # Include `development` so feature -> development RC PRs get the full
    # lint/test/self-lint matrix BEFORE merge. Without it, a merge to
    # `development` triggers publish.yml (which auto-releases a new RC to PyPI)
    # and ci.yml independently, so a broken RC could publish while CI fails
    # separately - pre-merge validation on the PR closes that gap.
    branches: [main, development, "release/*"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          # Least privilege: nothing after checkout does git operations, so keep
          # GITHUB_TOKEN out of .git/config (matches claude-review.yml).
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/ scripts/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/ scripts/

      - name: Type check (ty)
        run: uv run ty check src/ scripts/

      - name: Self-lint (safelint must pass itself)
        # CLAUDE.md mandates that ``safelint check src/`` produces zero
        # blocking violations before merging - pre-commit enforces this
        # locally, this step enforces it at the CI tier so a push that
        # bypasses pre-commit can't slip through. ``--fail-on=warning``
        # is the strict CI mode (``--mode=ci`` default), so warnings block
        # too - safelint's own source is warning-clean. ``scripts/`` and
        # ``tests/`` are linted too: their per-file-ignores live in
        # ``safelint.toml`` (``scripts/**`` drops the CLI-inherent
        # SAFE304/SAFE203; ``tests/fixtures/**`` is deliberately non-compliant
        # so it drops every rule; ``tests/**`` relaxes the structure/style
        # rules test scaffolding trips). ``check`` accepts multiple paths, so
        # all three lint in one invocation.
        run: |
          uv run safelint check src/ scripts/ tests/ --all-files --fail-on=warning

  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          # Least privilege: nothing after checkout does git operations, so keep
          # GITHUB_TOKEN out of .git/config (matches claude-review.yml).
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -q
