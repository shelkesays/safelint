name: Sync development with main

# After every push to main (a merged release + the auto-release workflow's
# CHANGELOG date-stamp commit), reset development to main so the two never
# diverge. That divergence is what forces squash-over-rebase: main carries a
# squashed release commit while development carries the individual commits, so
# the next release branch cut from development cannot rebase onto main. Keeping
# development identical to main after each release removes the whole class.
#
# Reset-if-safe: development is reset ONLY when it has no commits whose CONTENT
# is not already in main (measured by patch-id via git cherry, so a squash- or
# rebase-merged release - content-identical to main but different SHAs - still
# reads as safe). If genuinely unmerged work exists on development, the job
# refuses and fails loudly (visible in the Actions tab) rather than clobbering it.
#
# Loop safety: this force-pushes development, which triggers publish.yml on the
# development branch. After the reset development == main (a final version), and
# publish.yml only releases an rc from development, so its gate skips. No loop.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # open a tracking issue when a sync is refused

concurrency:
  group: sync-development
  cancel-in-progress: false

jobs:
  sync:
    name: Reset development to main (if safe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
          # Do not persist the token in .git/config (defence-in-depth, matches
          # publish.yml). The force-push injects RELEASE_PAT via an explicit URL.
          persist-credentials: false

      - name: Reset development to main when safe
        env:
          GH_TOKEN: ${{ github.token }}
          # RELEASE_PAT: force-pushing development needs to bypass its protection
          # (the default GITHUB_TOKEN cannot). Same token as publish.yml.
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          git fetch origin main development --quiet

          # Count development commits whose PATCH is not already in main, via
          # git cherry (patch-id) rather than `rev-list --count` (SHA). A
          # squash- or rebase-merged release leaves development's commits
          # content-identical to main but with different SHAs; a SHA count reads
          # those as "ahead" and refuses every time, whereas the patch-id count
          # correctly reads 0 and lets the reset auto-resolve. Only genuinely
          # unmerged content still counts as in-flight work.
          # Run git cherry on its own line so a real git failure aborts under
          # `set -e` (never masked as 0 == "safe to reset"); the `|| true` then
          # only absorbs grep -c's exit 1 on the expected no-'+'-lines case.
          CHERRY=$(git cherry origin/main origin/development)
          AHEAD=$(printf '%s\n' "$CHERRY" | grep -c '^+' || true)
          # git cherry is patch-id based and by construction SKIPS merge commits,
          # so a merge whose conflict-resolution introduced content unique to
          # development would be invisible to AHEAD. This repo's flow is
          # squash/rebase-merge, so development is linear after each reset and this
          # is normally 0; a merge commit in the range cannot be patch-compared,
          # so we refuse rather than risk clobbering unmerged resolution content -
          # the same conservative posture as the AHEAD guard. A human confirms the
          # merge is contained in main, then resets manually.
          MERGES=$(git rev-list --merges origin/main..origin/development --count)
          if [ "$AHEAD" -ne 0 ] || [ "$MERGES" -ne 0 ]; then
            DETAIL="$AHEAD commit(s) not in main"
            [ "$MERGES" -ne 0 ] && DETAIL="$DETAIL, $MERGES un-patch-comparable merge commit(s)"
            echo "::error::development diverges from main - refusing to reset ($DETAIL)."
            # Open a tracking issue (deduped by exact-title phrase search - the
            # quotes make the '-' in the title a literal, not a NOT operator, so
            # repeated main-pushes do not spam duplicates), then fail loudly.
            TITLE="development is ahead of main - auto-sync blocked"
            OPEN=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq 'length')
            if [ "$OPEN" -eq 0 ]; then
              gh issue create --title "$TITLE" --body \
          "The **sync-development** workflow refused to reset \`development\` to \`main\`: $DETAIL, so a reset could discard unmerged work.

          Resolve manually - land that work through the release flow, or once it is contained in main run:

              bin/sync.sh   # then: git branch -f development origin/main && git push --force-with-lease origin development

          Triggered by ${GITHUB_SHA:0:7} on main. This issue was opened automatically; close it once development and main are back in sync."
            fi
            exit 1
          fi

          if [ "$(git rev-parse origin/development)" = "$(git rev-parse origin/main)" ]; then
            echo "development already equals main - nothing to do."
            exit 0
          fi

          # Safe: development is fully contained in main, only the SHAs differ.
          # --force-with-lease guards against a race between the check and push.
          # Push via an explicit PAT URL (credentials are not persisted).
          REPO_URL="https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git branch -f development origin/main
          git push --force-with-lease=development:"$(git rev-parse origin/development)" "$REPO_URL" development
          echo "development reset to main ($(git rev-parse --short origin/main))."
