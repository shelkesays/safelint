name: Sync development with main

# After every push to main (a merged release + the auto-release workflow's
# CHANGELOG date-stamp commit), reset development to main so the two never
# diverge. That divergence is what forces squash-over-rebase: main carries a
# squashed release commit while development carries the individual commits, so
# the next release branch cut from development cannot rebase onto main. Keeping
# development identical to main after each release removes the whole class.
#
# Reset-if-safe: development is reset ONLY when it has no commits that are not
# already in main. If in-flight work exists on development, the job refuses and
# fails loudly (visible in the Actions tab) rather than clobbering it.
#
# Loop safety: this force-pushes development, which triggers publish.yml on the
# development branch. After the reset development == main (a final version), and
# publish.yml only releases an rc from development, so its gate skips. No loop.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # open a tracking issue when a sync is refused

concurrency:
  group: sync-development
  cancel-in-progress: false

jobs:
  sync:
    name: Reset development to main (if safe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          # RELEASE_PAT: force-pushing development needs to bypass its protection
          # (the default GITHUB_TOKEN cannot). Same token as publish.yml.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Reset development to main when safe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main development --quiet

          AHEAD=$(git rev-list origin/development ^origin/main --count)
          if [ "$AHEAD" -ne 0 ]; then
            echo "::error::development has $AHEAD commit(s) not in main - refusing to reset (in-flight work)."
            # Open a tracking issue (deduped by title so repeated main-pushes do
            # not spam), then fail loudly so it also surfaces in the Actions tab.
            TITLE="development is ahead of main - auto-sync blocked"
            OPEN=$(gh issue list --state open --search "in:title $TITLE" --json number --jq 'length')
            if [ "$OPEN" -eq 0 ]; then
              gh issue create --title "$TITLE" --body \
          "The **sync-development** workflow refused to reset \`development\` to \`main\`: development has $AHEAD commit(s) not in main (unmerged / in-flight work), so a reset would discard them.

          Resolve manually - land that work through the release flow, or once it is contained in main run:

              bin/sync.sh   # then: git branch -f development origin/main && git push --force-with-lease origin development

          Triggered by ${GITHUB_SHA:0:7} on main. This issue was opened automatically; close it once development and main are back in sync."
            fi
            exit 1
          fi

          if [ "$(git rev-parse origin/development)" = "$(git rev-parse origin/main)" ]; then
            echo "development already equals main - nothing to do."
            exit 0
          fi

          # Safe: development is fully contained in main, only the SHAs differ.
          # --force-with-lease guards against a race between the check and push.
          git branch -f development origin/main
          git push --force-with-lease=development:"$(git rev-parse origin/development)" origin development
          echo "development reset to main ($(git rev-parse --short origin/main))."
