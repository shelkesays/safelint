name: Publish to PyPI

# Triggered by pushing a version tag, e.g.:  git tag v1.3.1 && git push --tags
#
# PyPI setup (one-time, before the first release):
#   1. Create the project on pypi.org (first upload) or configure Trusted Publishing.
#   2. On pypi.org → your project → Manage → Publishing → add a trusted publisher:
#        Owner:      shelkesays
#        Repository: safelint
#        Workflow:   publish.yml
#        Environment: pypi
#   3. In GitHub → Settings → Environments → create an environment named "pypi".
#      (Optionally add a protection rule requiring a reviewer before deploy.)
#   No API token or secret is needed when using Trusted Publishing.

on:
  push:
    tags:
      # Match GA tags (v1.2.3) and PEP 440 pre-release suffixes
      # (v1.2.3rc1, v1.2.3a1, v1.2.3b2, v1.2.3.dev1). The trailing
      # ``*`` is GitHub Actions glob (not regex) - matches any
      # characters including empty. The "Verify tag matches project
      # version" step below guards against malformed suffixes by
      # comparing the tag to ``pyproject.toml`` ``project.version``,
      # which PEP 440 normalises.
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Least privilege: the build job only reads the tree, verifies the tag,
          # and builds/uploads artifacts - no git ops - so keep GITHUB_TOKEN out
          # of .git/config. The publish job omits checkout entirely.
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"

      - name: Verify tag matches project version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION=$(uv run --no-project python - <<'EOF'  
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "Error: git tag 'v${TAG}' does not match project.version '${PROJECT_VERSION}' in pyproject.toml"
            exit 1
          fi
          echo "Version check passed: ${PROJECT_VERSION}"

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/safelint

    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
