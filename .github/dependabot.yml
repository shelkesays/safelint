# Dependabot keeps the SHA-pinned GitHub Actions fresh. Actions are pinned to
# full commit SHAs (with a trailing `# vX.Y.Z` comment) for supply-chain
# safety - see the security-hardening plan, item H9. Dependabot understands
# SHA-pinned actions and will raise PRs that bump both the SHA and the comment
# when a new release ships, so pinning does not mean going stale.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    # Raise bumps against ``development`` (the RC branch), not the default
    # ``main`` - so action updates flow through the normal
    # feature/* -> development -> main release path and never diverge main from
    # development (which would conflict at the next development -> main release).
    target-branch: "development"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      # One grouped PR per week for routine action bumps keeps review load low;
      # a security bump still comes through immediately, ungrouped.
      github-actions:
        patterns:
          - "*"
