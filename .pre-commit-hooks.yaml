- id: safelint
  name: SafeLint (Holzmann safety rules)
  description: >
    Checks source files against safety-critical coding rules inspired by
    Gerard J. Holzmann's Power of Ten (NASA/JPL). Catches oversized functions,
    deep nesting, bare excepts, global mutation, unbounded loops, and more.
    Python is supported out of the box; JavaScript / TypeScript users add
    the matching extra via ``additional_dependencies: ['safelint[javascript]']``
    or ``['safelint[typescript]']`` in their ``.pre-commit-config.yaml`` so
    pre-commit's isolated environment installs the tree-sitter grammar.
  entry: safelint
  language: python  # the hook runtime — not the language being linted
  # Files passed to the hook. ``types_or`` lists the source-language
  # filetype tags pre-commit recognises; safelint then drops anything
  # that isn't in ``supported_extensions()``. Add the new tag here
  # when registering a new language. ``ts`` covers ``.ts``; ``tsx``
  # covers ``.tsx``; AssemblyScript (``.as``) is not a standard
  # pre-commit filetype tag — AS users should add a ``files: \.as$``
  # entry alongside this hook.
  types_or: [python, javascript, ts, tsx]
  args: [--fail-on=error]
