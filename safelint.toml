# safelint configuration — single source of truth for this repository.
#
# This file is the standalone safelint config (top-level keys, no
# ``[tool.safelint]`` wrapper). It takes precedence over ``[tool.safelint]``
# in ``pyproject.toml``; see the authoritative docstring in
# ``src/safelint/core/config.py`` for the precedence order:
# standalone ``safelint.toml`` → ``[tool.safelint]`` in ``pyproject.toml``
# → built-in defaults.
#
# All keys are optional; unset keys fall back to built-in defaults.

mode = "local"    # "local" | "ci"
fail_on = "warning" # "error" | "warning"
exclude_paths = ["tests/**", "docs/**"]

[execution]
fail_fast = false
order = [
    "function_length",
    "nesting_depth",
    "max_arguments",
    "bare_except",
    "empty_except",
    "global_state",
    "global_mutation",
    "unbounded_loops",
    "complexity",
    "side_effects_hidden",
    "side_effects",
    "logging_on_error",
    "resource_lifecycle",
    "test_coupling",
    "test_existence",
    "missing_assertions",
    "tainted_sink",
    "return_value_ignored",
    "null_dereference",
]

# ── Structural ────────────────────────────────────────────────────────────────
[rules.function_length]
enabled = true
max_lines = 60
severity = "error"

[rules.nesting_depth]
enabled = true
max_depth = 2
severity = "error"

[rules.max_arguments]
enabled = true
max_args = 7
severity = "error"

[rules.complexity]
enabled = true
max_complexity = 10
severity = "error"

# ── Error handling ────────────────────────────────────────────────────────────
[rules.bare_except]
enabled = true
severity = "error"

[rules.empty_except]
enabled = true
severity = "error"

[rules.logging_on_error]
enabled = true
severity = "warning"

# ── State & purity ────────────────────────────────────────────────────────────
[rules.global_state]
enabled = true
severity = "warning"

[rules.global_mutation]
enabled = true
severity = "error"

[rules.side_effects_hidden]
enabled = true
severity = "error"
io_functions = ["open", "print", "input", "subprocess"]
pure_prefixes = [
    "calculate", "compute", "get", "check", "validate",
    "is", "has", "find", "parse", "transform", "convert",
    "format", "build", "resolve", "detect",
]

[rules.side_effects]
enabled = true
severity = "warning"
io_functions = ["open", "print", "input"]
io_name_keywords = [
    "print", "log", "write", "read", "save", "load",
    "send", "fetch", "export", "import",
]

# ── Resource safety ───────────────────────────────────────────────────────────
[rules.resource_lifecycle]
enabled = true
severity = "error"
tracked_functions = ["open", "connect", "session"]
cleanup_patterns = ["close", "commit", "rollback"]

# ── Loop safety ───────────────────────────────────────────────────────────────
[rules.unbounded_loops]
enabled = true
severity = "warning"

# ── Documentation (heuristic) ─────────────────────────────────────────────────
[rules.missing_assertions]
enabled = false
severity = "warning"

# ── Test coverage (enable in CI) ──────────────────────────────────────────────
[rules.test_existence]
enabled = false
test_dirs = ["tests"]
severity = "warning"

[rules.test_coupling]
enabled = false
test_dirs = ["tests"]
severity = "warning"

# ── Dataflow hybrid rules (opt-in) ────────────────────────────────────────────
[rules.tainted_sink]
enabled = false
severity = "error"
sinks = ["eval", "exec", "compile", "system", "popen", "Popen", "run", "call", "check_output", "execute"]
sanitizers = ["escape", "sanitize", "clean", "validate", "quote", "encode", "bleach"]
sources = ["input", "readline", "recv", "recvfrom", "read"]

[rules.return_value_ignored]
enabled = false
severity = "warning"
flagged_calls = [
    "run", "call", "check_output",
    "write", "send", "sendall", "sendfile",
    "seek", "truncate",
    "remove", "unlink", "rename", "replace",
    "makedirs", "mkdir", "rmdir",
]

[rules.null_dereference]
enabled = false
severity = "error"
nullable_methods = ["get", "pop", "find", "next", "first", "one_or_none", "scalar", "scalar_one_or_none", "fetchone"]
