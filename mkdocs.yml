site_name: SafeLint
site_description: Holzmann Power-of-Ten safety lint rules for modern Python, JavaScript, TypeScript, and Java (with Spring Boot framework preset)
site_url: https://shelkesays.github.io/safelint/
site_author: Rahul Shelke
repo_url: https://github.com/shelkesays/safelint
repo_name: shelkesays/safelint
edit_uri: edit/main/docs/

# Build behaviour --------------------------------------------------------------

# Treat warnings (broken internal links, missing nav targets, orphan pages,
# etc.) as errors. CI runs `mkdocs build --strict` so a doc regression fails
# fast rather than silently shipping. Locally, run `uv run mkdocs serve` for
# a non-strict live preview.
strict: false  # set to true via CLI flag in CI

# Hooks: run scripts/prepare_docs.py before every build/serve so the rules-
# at-a-glance snippet and the docs/-tree copies of CHANGELOG / CONTRIBUTING
# / CODE_OF_CONDUCT / SUPPORT stay in sync without a manual prep step.
hooks:
  - scripts/prepare_docs.py

theme:
  name: material
  language: en
  # Brand identity - SVGs served from ``docs/assets/`` (committed
  # alongside the markdown so mkdocs picks them up via its default
  # static-asset handling). Two separate files: the full wordmark
  # logo for the header, and a stripped-down icon variant for the
  # browser favicon (which renders at 16-32px and needs the simpler
  # shape to stay legible).
  logo: assets/safelint-logo.svg
  favicon: assets/safelint-icon.svg
  features:
    - content.action.edit         # "Edit this page" button at the page head
    - content.code.copy           # copy button on every code block
    - content.code.annotate       # inline ``# (1)`` -> footnote-style annotations
    - content.tabs.link           # tabbed content (e.g. per-client install)
    - navigation.tabs             # top-level sections as tabs
    - navigation.sections         # section headers in left nav
    - navigation.indexes          # section index pages (foo/index.md)
    - navigation.top              # back-to-top button on long pages
    - navigation.footer           # next/previous links at the foot of every page
    - search.suggest              # search-as-you-type suggestions
    - search.highlight            # highlight matched terms on result page
    - search.share                # shareable URL for any search query
    - toc.follow                  # right-rail TOC follows scroll
  palette:
    # Light/dark toggle. Auto-respects system preference; user can override.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition                    # !!! note / warning / tip blocks
  - attr_list                     # {.foo} class attributes on elements
  - md_in_html                    # Markdown inside HTML blocks
  - meta                          # YAML frontmatter - used by prepare_docs.py
                                  # to set per-page edit_url on the gitignored
                                  # community-health copies
  - tables
  - footnotes
  - toc:
      permalink: "#"              # link icon next to each heading
      toc_depth: 3
  - pymdownx.details              # collapsible admonitions
  - pymdownx.superfences          # nested fences inside admonitions / tabs
  # Note: this used to declare a ``custom_fences:`` block enabling
  # mermaid diagrams via ``format: !!python/name:...``. The
  # ``!!python/name:`` YAML tag is mkdocs/PyYAML-specific and trips
  # generic YAML linters / IDE schemas with "Unresolved tag" warnings.
  # We don't actually use mermaid anywhere under ``docs/``, so the
  # block is removed. If a future page needs a mermaid diagram, the
  # canonical Material recipe is to put it back:
  #
  #   - pymdownx.superfences:
  #       custom_fences:
  #         - name: mermaid
  #           class: mermaid
  #           format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:              # tabbed content blocks
      alternate_style: true
  - pymdownx.snippets:            # include from outside docs/
      base_path: ["build/snippets", "docs"]
      check_paths: true           # fail-fast if a snippet target is missing
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true

# Site navigation --------------------------------------------------------------
nav:
  - Home: index.md
  - The Power of Ten: power-of-ten.md
  - Languages:
      - Python: languages/python.md
      - JavaScript: languages/javascript.md
      - TypeScript: languages/typescript.md
      - Java: languages/java.md
      - Rust: languages/rust.md
  # CLI commands and flags is a top-level entry (not nested under
  # Configuration) so users searching for "commands" or "list-rules"
  # find it without expanding a section. The page lives at
  # docs/configuration/cli.md so the URL stays stable for any external
  # links pointing at .../configuration/cli/.
  - CLI commands and flags: configuration/cli.md
  - Configuration:
      - Overview: configuration/index.md
      - Suppression mechanisms: configuration/suppression.md
      - Configuration file: configuration/toml.md
      - Rules reference: configuration/rules.md
  - Pre-commit: pre-commit.md
  - AI client integrations:
      - Overview: ai-clients/index.md
      - Manual install: ai-clients/manual-install.md
      - Project vs user scope: ai-clients/scope.md
      - Updating, removing, freshness: ai-clients/lifecycle.md
      - Troubleshooting: ai-clients/troubleshooting.md
      # Ordered by approximate real-world usage in mid-2026; subjective
      # ranking (no clean public dataset for AI-agent market share), but
      # the rough buckets are mainstream / mid / lower / niche. Update
      # when the field shifts; the registry order in ``_skill_install.py``
      # is unchanged because it drives auto-detection / CLI output and
      # shouldn't be reshuffled for popularity reasons.
      - Per-client guides:
          - GitHub Copilot: ai-clients/clients/github-copilot.md
          - Cursor: ai-clients/clients/cursor.md
          - Claude Code: ai-clients/clients/claude-code.md
          - codex: ai-clients/clients/codex.md
          - Gemini: ai-clients/clients/gemini.md
          - Windsurf: ai-clients/clients/windsurf.md
          - Continue.dev: ai-clients/clients/continue-dev.md
          - Cline: ai-clients/clients/cline.md
          - Zed: ai-clients/clients/zed.md
          - Warp: ai-clients/clients/warp.md
          - Kiro: ai-clients/clients/kiro.md
          - aider: ai-clients/clients/aider.md
          - Antigravity: ai-clients/clients/antigravity.md
          - Trae: ai-clients/clients/trae.md
  - JSON output schema: json-schema.md
  - Contributing:
      - Overview: contributing/index.md
      - Adding an AI client: contributing/adding-an-ai-client.md
      - Adding a language: contributing/adding-a-language.md
  - Project:
      - Changelog: project/changelog.md
      - Code of conduct: project/code-of-conduct.md
      - Security policy: project/security.md
      - Support: project/support.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shelkesays/safelint
      name: safelint on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/safelint/
      name: safelint on PyPI

# Files outside docs/ that the ``hooks:`` entry point above
# (``scripts/prepare_docs.py``) copies into the docs tree on every build /
# serve, with cross-reference rewriting:
#   CONTRIBUTING.md       → docs/contributing/index.md
#   CHANGELOG.md          → docs/project/changelog.md
#   CODE_OF_CONDUCT.md    → docs/project/code-of-conduct.md
#   SECURITY.md           → docs/project/security.md
#   SUPPORT.md            → docs/project/support.md
# Plus the rules-at-a-glance snippet at build/snippets/_rules_at_a_glance.md
# (sourced from ``safelint.rules.ALL_RULES``). All targets are NOT committed
# (gitignored) - source of truth is the repo-root file (which GitHub also
# surfaces in its community-health UI). Because the prep step is wired in
# as a hook, ``uv run mkdocs serve`` and ``uv run mkdocs build --strict``
# both regenerate everything automatically - no separate prep command.
