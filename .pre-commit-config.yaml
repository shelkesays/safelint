exclude: ^tests/fixtures/

repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        files: ^src/
      - id: check-ast
        files: ^src/
      - id: check-builtin-literals
        files: ^src/
      - id: check-case-conflict
        files: ^src/
      - id: check-docstring-first
        exclude: ^(doc-source/conf|__pkginfo__|setup|tests/.*)\.py$
        files: ^src/
      - id: check-merge-conflict
        files: ^src/
      - id: debug-statements
        files: ^src/
      - id: check-symlinks
        files: ^src/
      - id: check-json
        files: ^src/
      - id: check-toml
        files: ^src/
      - id: check-yaml
      - id: fix-byte-order-marker
      - id: end-of-file-fixer
        files: ^src/
      # Repo-wide CRLF → LF normalisation (except ``tests/fixtures/``,
      # excluded globally at the top of this file — fixture files may
      # carry intentionally weird line endings as test inputs).
      # Deliberately unscoped at the hook level (no ``files:`` selector)
      # so README.md, CHANGELOG.md, .pre-commit-config.yaml, workflows,
      # examples — anything a Windows contributor might touch — stay LF.
      # The original Lucas-C remove-crlf/forbid-crlf was scoped to
      # ^src/; we broaden here because the project has no .bat/.cmd/.ps1
      # files (which would legitimately need CRLF) and there's no
      # downside to enforcing one line-ending convention everywhere
      # outside the fixture directory.
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
        files: ^src/
      - id: detect-private-key
        files: ^src/
      - id: requirements-txt-fixer
        files: ^requirements\.txt$
      - id: check-shebang-scripts-are-executable
        files: ^src/
      - id: name-tests-test
        args: ['--pytest-test-first']
        exclude: ^tests/mock_data.py$
        files: ^tests/
      - id: pretty-format-json
        args: ['--autofix', '--indent', '4']
        files: ^src/
      - id: no-commit-to-branch
        args: ['--branch', 'master', '--branch', 'main', '--pattern', '.*-master$', '--pattern', '.*-main$']
        files: ^src/

  # ---------------------------------------------------------------------------
  # Tab enforcement for non-Python files under src/
  #
  # The four Lucas-C/pre-commit-hooks behaviours (remove-tabs, forbid-tabs,
  # remove-crlf, forbid-crlf) are now covered by three separate layers:
  #
  #   * ``ruff format`` (below) — rewrites tab indentation to spaces in
  #     .py files because [tool.ruff.format] sets indent-style = "space".
  #     Replaces remove-tabs / forbid-tabs for Python sources.
  #   * ``mixed-line-ending`` (above, with ``--fix=lf``, no ``files:``
  #     selector) — normalises CRLF → LF across the whole repo, broader
  #     than the original Lucas-C scope of ^src/. Replaces remove-crlf /
  #     forbid-crlf.
  #   * This hook — closes the remaining gap: tabs in *non-Python* text
  #     under src/. Currently catches the skill_files/*.md files that
  #     ship in the wheel, and any future markdown / config we add there.
  #     Scoped to ^src/ on purpose so a future Makefile (which legitimately
  #     uses tab syntax) at the repo root wouldn't trip it.
  #
  # No external repo dependency — runs the same Python pre-commit already
  # requires, via a portable one-liner.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      # Uses pre-commit's built-in ``pygrep`` language: matches a Python
      # regex against staged file contents and fails the hook on any match.
      # Built into pre-commit itself, so there's no dependency on the host
      # having ``python`` (vs ``python3``) on PATH and no virtualenv to
      # provision. ``\t`` is the Python regex for a literal tab character.
      - id: forbid-tabs-non-python
        name: forbid tabs in non-Python source files
        language: pygrep
        entry: '\t'
        files: ^src/
        exclude: \.py$

  # ---------------------------------------------------------------------------
  # Linting + formatting - replaces: flake8, pylint, black, pyupgrade, isort, bandit
  # Docstring presence (D1xx) - replaces: interrogate
  # Config: [tool.ruff] / [tool.ruff.lint] in pyproject.toml
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes, --exit-non-zero-on-fix]
        files: ^src/
      - id: ruff-format
        files: ^src/

  # ---------------------------------------------------------------------------
  # SafeLint - Holzmann-inspired safety rules
  # Self-development hook: runs the in-tree code via `uv run safelint`,
  # not the published release. Avoids drift between hook and source while
  # iterating on safelint itself. Downstream consumers should pin
  # `repo: https://github.com/shelkesays/safelint` with a `rev: vX.Y.Z`
  # — see README "Pre-commit integration".
  #
  # Severity model:
  #   --fail-on=error    only error-severity violations block  ← default (lenient)
  #   --fail-on=warning  error + warning violations block      ← strict (CI)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: safelint
        name: safelint (in-tree)
        language: system
        entry: uv run --extra dev safelint
        args: [--fail-on=error]
        types: [python]
        files: ^src/

  # ---------------------------------------------------------------------------
  # Local hooks - tools without published pre-commit integrations
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      # Type checking - replaces mypy; config: [tool.ty] in pyproject.toml
      # No official pre-commit integration yet (ty is pre-release)
      - id: ty
        name: ty (type check)
        language: system
        entry: uv run --extra dev ty check
        args: [src/]
        types: [python]
        pass_filenames: false
        always_run: true

      # Tests + coverage - config: [tool.pytest.ini_options] / [tool.coverage] in pyproject.toml
      - id: pytest-cov
        name: pytest-cov
        stages: [pre-commit]
        language: system
        entry: uv run --extra dev pytest -v --cov=src --cov-report=term-missing tests/
        types: [python]
        pass_filenames: false
        always_run: true
